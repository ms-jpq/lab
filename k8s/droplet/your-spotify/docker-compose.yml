---
services:
  web:
    image: ghcr.io/yooooomi/your_spotify_client:latest
    labels:
      kompose.service.expose: spotify.${DOMAIN}
    environment:
      API_ENDPOINT: &api https://api.spotify.${DOMAIN}
    ports:
      - 3000

  server:
    image: ghcr.io/yooooomi/your_spotify_server:latest
    labels:
      kompose.service.expose: api.spotify.${DOMAIN}
    environment:
      API_ENDPOINT: https://api.spotify.${DOMAIN}
      CLIENT_ENDPOINT: *api
      CORS: https://spotify.${DOMAIN}
      MONGO_ENDPOINT: mongodb://mongo.${COMPOSE_PROJECT_NAME}.svc.cluster.local:27017/${COMPOSE_PROJECT_NAME}
      SPOTIFY_PUBLIC:
      SPOTIFY_SECRET:
    ports:
      - 8080

  mongo:
    image: docker.io/library/mongo:8
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
    command:
      - mongod
      - --noauth
      - --ipv6
    ports:
      - 27017
    volumes:
      - /var/lib/local/your-spotify/mongo:/data/db
