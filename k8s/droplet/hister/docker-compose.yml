---
services:
  hister:
    image: ghcr.io/asciimoo/hister:latest
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
      kompose.service.expose: hister.${DOMAIN}
    command:
      - listen
      - --config
      - &conf /srv/config.yml
    environment:
      HISTER__SERVER__ADDRESS: "[::]:4433"
      HISTER__SERVER__BASE_URL: https://hister.${DOMAIN}
      HISTER_PORT: &port 4433
    ports:
      - *port
    configs:
      - source: config
        target: *conf
    volumes:
      - /var/lib/local/hister/data:/hister/data

  pg:
    image: docker.io/library/postgres:18
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
    environment:
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME}
      POSTGRES_PASSWORD: ${COMPOSE_PROJECT_NAME}
      POSTGRES_USER: ${COMPOSE_PROJECT_NAME}
    ports:
      - 5432
    volumes:
      - /var/lib/local/hister/postgresql:/var/lib/postgresql

configs:
  config:
    file: ./config.yml
