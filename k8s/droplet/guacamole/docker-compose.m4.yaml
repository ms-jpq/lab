---
x-k8s:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      labels:
        io.kompose.service: &svc guacamole
      name: *svc
      namespace: ${COMPOSE_PROJECT_NAME}
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: kube-system
      hostnames:
        - rdp.m5_assert([ENV_DOMAIN])
      rules:
        - filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: Authorization
                    value: Basic Z3VhY2FkbWluOmd1YWNhZG1pbg==
          backendRefs:
            - name: *svc
              port: 8080

services:
  guacamole:
    image: &img docker.io/guacamole/guacamole:latest
    environment:
      GUACD_HOSTNAME: guacd.${COMPOSE_PROJECT_NAME}.svc.cluster.local
      REMOTE_IP_VALVE_ENABLED: true
      POSTGRES_DATABASE:
      POSTGRES_HOSTNAME:
      POSTGRES_PASSWORD:
      POSTGRES_USER:
      WEBAPP_CONTEXT: ROOT
    ports:
      - 8080

  guacd:
    image: docker.io/guacamole/guacd:latest
    ports:
      - 4822

  pg:
    image: docker.io/library/postgres:latest
    labels:
      kompose.controller.type: statefulset
      kompose.init.containers.image: *img
      kompose.init.containers.command: '["sh", "-c", "/opt/guacamole/bin/initdb.sh --postgresql > /var/tmp/init.sql"]'
    environment:
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME}
      POSTGRES_PASSWORD: ${COMPOSE_PROJECT_NAME}
      POSTGRES_USER: ${COMPOSE_PROJECT_NAME}
    ports:
      - 5432
    volumes:
      - data:/var/lib/postgresql

volumes:
  data:
