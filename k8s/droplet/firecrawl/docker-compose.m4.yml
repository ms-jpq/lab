---
x-k8s:
  # m5_for([PROXY_NS], [
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: addn-policy-PROXY_NS
      namespace: ${COMPOSE_PROJECT_NAME}
    spec:
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kompsed-PROXY_NS
  # ], librechat)

services:
  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    environment:
      ENV: local
      HOST: "::"
    ports:
      - 3002

  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    environment:
      BLOCK_MEDIA: true
      PORT: 3000
      PROXY_SERVER: socks5://proxy.kompsed-hostproxy.svc.cluster.local:1080
    ports:
      - 3000

  redis:
    image: ghcr.io/valkey-io/valkey:latest
    ports:
      - 6379
    volumes:
      - redis:/data

  rabbitmq:
    image: docker.io/library/rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: ${COMPOSE_PROJECT_NAME}
      RABBITMQ_DEFAULT_PASS: ${COMPOSE_PROJECT_NAME}
    ports:
      - 5672
    volumes:
      - rabbitmq:/var/lib/rabbitmq

  pg:
    image: docker.io/library/postgres:latest
    labels:
      kompose.controller.type: statefulset
    ports:
      - 5432
    volumes:
      - data:/var/lib/postgresql

volumes:
  data:
  rabbitmq:
  redis:
