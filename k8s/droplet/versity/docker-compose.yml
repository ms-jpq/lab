---
services:
  versity:
    image: ghcr.io/versity/versitygw:latest
    labels:
      kompose.controller.type: statefulset
      kompose.service.expose: s3.${DOMAIN}
      kompose.volume.type: hostPath
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ROOT_ACCESS_KEY:
      ROOT_SECRET_KEY:
      VGW_CORS_ALLOW_ORIGIN: "*"
      VGW_IAM_DIR: /iam
      VGW_WEBUI_GATEWAYS: https://s3.${DOMAIN}
      VGW_WEBUI_S3_PREFIX: /ui
    command:
      - posix
      - /data
    ports:
      - 7070
    volumes:
      - /var/lib/local/versity/data:/data
      - /var/lib/local/versity/iam:/iam

  versity-prune:
    image: docker.io/library/ubuntu:latest
    labels:
      kompose.cronjob.backoff_limit: 0
      kompose.cronjob.concurrency_policy: Forbid
      kompose.cronjob.schedule: 0 0 * * *
      kompose.volume.type: hostPath
    # prettier-ignore
    command: [find, /data, -mindepth, "2", (, (, -type, f, -and, -mtime, "+30", ), -or, (, -type, d, -and, -empty, -and, -mtime, "+30", ), ), -print, -delete]
    volumes:
      - /var/lib/local/versity/data:/data
