---
x-networkpolicy:
  - bifrost

services:
  crawl4ai:
    image: docker.io/unclecode/crawl4ai:latest
    # labels:
    #   kompose.service.expose: crawl4ai.${DOMAIN}
    deploy:
      resources:
        limits:
          memory: 4G
    entrypoint:
      - sh
      - -euxc
      - |-
        sed -e 's|0\.0\.0\.0:11235|[::]:11235|' -- /app/supervisord.conf > /tmp/supervisord.conf
        exec supervisord -c /tmp/supervisord.conf
    ports:
      - 11235
    volumes:
      - ./config.yml:/app/config.yml:ro
