---
x-networkpolicy:
  - bifrost

services:
  crawl4ai:
    image: docker.io/unclecode/crawl4ai:latest
    # labels:
    #   kompose.service.expose: crawl4ai.${DOMAIN}
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      GUNICORN_BIND: "[::]:11235"
      REDIS_PASSWORD: crawl4ai
    ports:
      - 11235
    volumes:
      - ./config.yml:/app/config.yml:ro
