---
x-k8s:
  # m5_for([PROXY_NS], [
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: addn-policy-PROXY_NS
      namespace: ${COMPOSE_PROJECT_NAME}
    spec:
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kompsed-PROXY_NS
  # ], librechat)

services:
  searx:
    image: docker.io/isokoliuk/mcp-searxng:latest
    labels:
      kompose.service.expose: mcp-searx.${DOMAIN}
    environment:
      MCP_HTTP_PORT: 8080
      SEARXNG_URL: http://searxng.kompsed-searx.svc.cluster.local:8080
      URL_READER_HTTP_PROXY: http://proxy.kompsed-hostproxy.svc.cluster.local:1080
    ports:
      - 8080

  time:
    image: docker.io/supercorp/supergateway:uvx
    labels:
      kompose.service.expose: mcp-time.${DOMAIN}
    environment:
      TZ: America/New_York
    command:
      - --outputTransport=streamableHttp
      - --stdio
      - uvx mcp-server-time
    ports:
      - 8000

  firecrawl:
    image: ghcr.io/firecrawl/firecrawl-mcp-server:latest
    labels:
      kompose.service.group: &firecrawl firecrawl-proxy
    environment:
      FIRECRAWL_API_URL: http://firecrawl.kompsed-firecrawl.svc.cluster.local:3002
      HTTP_STREAMABLE_SERVER: true

  firecrawl-proxy:
    image: docker.io/library/nginx:latest
    labels:
      kompose.service.expose: mcp-firecrawl.${DOMAIN}
      kompose.service.group: *firecrawl
    command:
      - nginx
      - -g
      - "daemon off;"
      - -c
      - /etc/nginx/nginx2.conf
    ports:
      - 1080
    volumes:
      - ./firecrawl.nginx:/etc/nginx/nginx2.conf:ro

  terraform:
    image: docker.io/hashicorp/terraform-mcp-server:latest
    labels:
      kompose.service.group: &terraform terraform-proxy
    environment:
      MCP_CORS_MODE: disabled
      TRANSPORT_MODE: streamable-http

  terraform-proxy:
    image: docker.io/library/nginx:latest
    labels:
      kompose.service.expose: mcp-terraform.${DOMAIN}
      kompose.service.group: *terraform
    ports:
      - 1080
    volumes:
      - ./terraform.nginx:/etc/nginx/nginx.conf:ro

  dockerhub:
    image: docker.io/mcp/dockerhub:latest
    labels:
      kompose.service.expose: mcp-dockerhub.${DOMAIN}
    command:
      - --transport=http
    ports:
      - 3000

  context7:
    image: docker.io/mcp/context7:latest
    labels:
      kompose.service.expose: mcp-context7.${DOMAIN}
    ports:
      - 8080

