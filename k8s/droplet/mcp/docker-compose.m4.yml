---
x-k8s:
  # m5_for([PROXY_NS], [
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: addn-policy-PROXY_NS
      namespace: ${COMPOSE_PROJECT_NAME}
    spec:
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kompsed-PROXY_NS
  # ], librechat)

services:
  searx:
    image: docker.io/isokoliuk/mcp-searxng:latest
    labels:
      kompose.service.expose: searx.mcp.${DOMAIN}
    environment:
      MCP_HTTP_PORT: 8080
      SEARXNG_URL: http://searxng.kompsed-searx.svc.cluster.local:8080
      URL_READER_HTTP_PROXY: http://proxy.kompsed-hostproxy.svc.cluster.local:1080
    ports:
      - 8080

  playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    labels:
      kompose.service.expose: playwright.mcp.${DOMAIN}
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      PLAYWRIGHT_MCP_ALLOWED_HOSTS: "*"
      PLAYWRIGHT_MCP_HOST: "::"
      PLAYWRIGHT_MCP_ISOLATED: true
      PLAYWRIGHT_MCP_OUTPUT_DIR: /tmp/playwright-home
      PLAYWRIGHT_MCP_PORT: 8080
      PLAYWRIGHT_MCP_PROXY_SERVER: socks5://proxy.kompsed-hostproxy.svc.cluster.local:1080
      PLAYWRIGHT_MCP_SNAPSHOT_MODE: none
    ports:
      - 8080
    volumes:
      - playwright:/tmp/playwright-home

  kubernetes:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    command:
      - --port=8080
    ports:
      - 8080

