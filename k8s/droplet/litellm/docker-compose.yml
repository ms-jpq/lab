---
services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    labels:
      kompose.service.expose: litellm.${DOMAIN}
    environment:
      DATABASE_URL: postgres://${COMPOSE_PROJECT_NAME}:${COMPOSE_PROJECT_NAME}@pg.${COMPOSE_PROJECT_NAME}.svc.cluster.local/${COMPOSE_PROJECT_NAME}
      LITELLM_MASTER_KEY:
      REDIS_HOST: redis.${COMPOSE_PROJECT_NAME}.svc.cluster.local
      REDIS_PORT: 6379
      STORE_MODEL_IN_DB: "True"
    command:
      - --config
      - /app/config.yaml
      - --host
      - "::"
      - --port
      - "4000"
    ports:
      - 4000
    volumes:
      - ./conf.yml:/app/config.yaml:ro

  pg:
    image: docker.io/library/postgres:18
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
    environment:
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME}
      POSTGRES_PASSWORD: ${COMPOSE_PROJECT_NAME}
      POSTGRES_USER: ${COMPOSE_PROJECT_NAME}
    ports:
      - 5432
    volumes:
      - /var/lib/local/litellm:/var/lib/postgresql

  redis:
    image: ghcr.io/valkey-io/valkey:latest
    ports:
      - 6379
    volumes:
      - data:/data

volumes:
  data:
