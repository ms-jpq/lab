---
x-k8s:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      labels:
        io.kompose.service: &litellm litellm
      name: *litellm
      namespace: ${COMPOSE_PROJECT_NAME}
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: kube-system
      hostnames:
        - litellm.m5_assert([ENV_DOMAIN])
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /v1/responses
            - path:
                type: PathPrefix
                value: /v1/chat/completions
            - path:
                type: PathPrefix
                value: /chat/completions
            - path:
                type: PathPrefix
                value: /v1/models
          filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: Authorization
                    value: Bearer m5_assert([ENV_MINIFLUX_PASSWORD])
          backendRefs:
            - name: *litellm
              port: 4000
        - backendRefs:
            - name: *litellm
              port: 4000

services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      DATABASE_URL: postgres://${COMPOSE_PROJECT_NAME}:${COMPOSE_PROJECT_NAME}@pg.${COMPOSE_PROJECT_NAME}.svc.cluster.local/${COMPOSE_PROJECT_NAME}
      LANGFUSE_OTEL_HOST: http://langfuse-web.komposed-langfuse.svc.cluster.local:3000
      LANGFUSE_PUBLIC_KEY:
      LANGFUSE_SECRET_KEY:
      LITELLM_MASTER_KEY: m5_assert([ENV_MINIFLUX_PASSWORD])
      REDIS_HOST: redis.${COMPOSE_PROJECT_NAME}.svc.cluster.local
      STORE_MODEL_IN_DB: true
      UI_USERNAME:
    command:
      - --config
      - /app/config.yaml
      - --host
      - ""
      - --port
      - "4000"
    ports:
      - 4000
    volumes:
      - ./conf.yml:/app/config.yaml:ro
      - ./codex_tool_filter.py:/app/codex_tool_filter.py:ro

  pg:
    image: docker.io/library/postgres:18
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
    environment:
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME}
      POSTGRES_PASSWORD: ${COMPOSE_PROJECT_NAME}
      POSTGRES_USER: ${COMPOSE_PROJECT_NAME}
    ports:
      - 5432
    volumes:
      - /var/lib/local/litellm:/var/lib/postgresql

  redis:
    image: ghcr.io/valkey-io/valkey:latest
    ports:
      - 6379
    volumes:
      - data:/data

volumes:
  data:
