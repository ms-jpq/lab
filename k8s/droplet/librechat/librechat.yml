# https://github.com/danny-avila/LibreChat/blob/main/librechat.example.yaml
---
version: 1.3.9

mcpSettings:
  allowedDomains:
    - "*.svc.cluster.local"

mcpServers:
  bifrost:
    type: http
    url: http://bifrost.kompsed-bifrost.svc.cluster.local:8080/mcp
  kubernetes:
    type: http
    url: http://mcp.kompsed-k8s-mcp.svc.cluster.local:8080/mcp
  playwright:
    type: http
    url: http://playwright.kompsed-mcp.svc.cluster.local:8080/mcp
  redis:
    type: http
    url: http://mcp.kompsed-redis-commander.svc.cluster.local:8000/mcp
  youtube:
    type: http
    url: http://youtube-transcript.kompsed-mcp.svc.cluster.local:8080/mcp

memory:
  disabled: true
