# https://github.com/danny-avila/LibreChat/blob/main/librechat.example.yaml
---
version: 1.3.6

mcpSettings:
  allowedDomains:
    - "*.svc.cluster.local"

mcpServers:
  firecrawl:
    type: http
    url: http://firecrawl-proxy.kompsed-mcp.svc.cluster.local:1080/mcp
  time:
    type: http
    url: http://time.kompsed-mcp.svc.cluster.local:8000/mcp
  context7:
    type: http
    url: http://context7.kompsed-mcp.svc.cluster.local:8080/mcp
  dockerhub:
    type: http
    url: http://dockerhub.kompsed-mcp.svc.cluster.local:3000/mcp
  terraform:
    type: http
    url: http://terraform-proxy.kompsed-mcp.svc.cluster.local:1080/mcp
