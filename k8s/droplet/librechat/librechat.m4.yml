# https://github.com/danny-avila/LibreChat/blob/main/librechat.example.yaml
---
version: 1.3.6

mcpSettings:
  allowedDomains:
    - "*.svc.cluster.local"

mcpServers:
  searx:
    type: http
    url: http://searx.kompsed-mcp.svc.cluster.local:8080/mcp
  crawl4ai:
    type: sse
    url: http://crawl4ai.kompsed-crawl4ai.svc.cluster.local:11235/mcp/sse
  kubernetes:
    type: http
    url: http://kubernetes.kompsed-mcp.svc.cluster.local:8080/mcp
  playwright:
    type: http
    url: http://playwright.kompsed-mcp.svc.cluster.local:8080/mcp
