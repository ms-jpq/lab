# https://github.com/danny-avila/LibreChat/blob/main/librechat.example.yaml
---
version: 1.3.9

mcpSettings:
  allowedDomains:
    - "*.m5_assert([ENV_DOMAIN])"
    - "*.svc.cluster.local"

mcpServers:
  crawl4ai:
    type: sse
    url: https://crawl4ai.mcp.m5_assert([ENV_DOMAIN])/mcp/sse
  kubernetes:
    type: http
    url: http://mcp.komposed-k8s-mcp.svc.cluster.local:8080/mcp
  playwright:
    type: http
    url: http://playwright.komposed-mcp.svc.cluster.local:8080/mcp
  searx:
    type: http
    url: http://mcp.komposed-searx.svc.cluster.local:8080/mcp
  time:
    type: http
    url: http://time.komposed-mcp.svc.cluster.local:8000/mcp
  youtube:
    type: http
    url: http://youtube-transcript.komposed-mcp.svc.cluster.local:8000/mcp

memory:
  disabled: true

endpoints:
  custom:
    - name: "deepseek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        default:
          - "deepseek-v4-pro"
          - "deepseek-v4-flash"
        fetch: true
      titleConvo: true
      titleModel: "deepseek-v4-flash"
      modelDisplayLabel: "DeepSeek"
