---
services:
  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    labels:
      kompose.controller.type: statefulset
      kompose.service.expose: chat.${DOMAIN}
    environment:
      DEEPSEEK_API_KEY:
      HOST: "::"
      JWT_REFRESH_SECRET:
      JWT_SECRET:
      MONGO_URI: mongodb://mongo.komposed-librechat.svc.cluster.local:27017/
      NO_INDEX: true
      OPENROUTER_KEY:
      REDIS_URI: redis://redis.komposed-librechat.svc.cluster.local:6379
      USE_REDIS: true
      XAI_API_KEY:
    ports:
      - 3080
    volumes:
      - ./librechat.yml:/app/librechat.yaml:ro
      - images:/app/client/public/images
      - logs:/app/api/logs
      - uploads:/app/uploads

  mongo:
    image: docker.io/library/mongo:8
    labels:
      kompose.controller.type: statefulset
      kompose.volume.type: hostPath
    command:
      - mongod
      - --noauth
      - --ipv6
    ports:
      - 27017
    volumes:
      - /var/lib/local/librechat/mongo:/data/db

  redis:
    image: ghcr.io/valkey-io/valkey:latest
    labels:
      kompose.controller.type: statefulset
    ports:
      - 6379
    volumes:
      - redis:/data

volumes:
  images:
  logs:
  redis:
  uploads:
