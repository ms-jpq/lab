# https://github.com/ZhiYi-R/moon-bridge/blob/main/config.example.yml
---
mode: Transform

server:
  auth_token: m5_assert([ENV_MINIFLUX_PASSWORD])
  addr: :38440

extensions:
  codex_tool_proxy:
    enabled: true

defaults:
  max_tokens: 1048576

models:
  deepseek-v4-pro:
    web_search:
      support: auto
    extensions:
      deepseek_v4:
        enabled: true
      codex_tool_proxy:
        enabled: true
  "glm-5.2[[1m]]":
    context_window: 1048576
    extensions:
      codex_tool_proxy:
        enabled: true
    max_output_tokens: 131072
    input_modalities:
      - text
    supports_reasoning: true
    default_reasoning_level: high
    supported_reasoning_levels:
      - effort: high
      - effort: max
    supports_reasoning_summaries: true
    supports_parallel_tool_calls: true
    web_search:
      support: auto

providers:
  deepseek:
    api_key: m5_assert([ENV_DEEPSEEK_API_KEY])
    base_url: https://api.deepseek.com/anthropic
    offers:
      - model: deepseek-v4-pro

  z-ai:
    api_key: m5_assert([ENV_ZAI_API_KEY])
    base_url: https://api.z.ai/api/anthropic
    offers:
      - model: "glm-5.2[[1m]]"
