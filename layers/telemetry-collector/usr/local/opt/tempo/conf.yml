# https://grafana.com/docs/tempo/latest/configuration/
---
stream_over_http_enabled: true
server:
  http_listen_port: 3200
  grpc_listen_port: 9096
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 127.0.0.53:44318

metrics_generator:
  processor:
    &proc_svc service_graphs: {}
    &proc_span span_metrics: {}
  storage:
    path: /var/lib/local/tempo/generator/wal

storage:
  trace:
    backend: local
    wal:
      path: /var/lib/local/tempo/wal
    local:
      path: /var/lib/local/tempo/blocks

live_store:
  max_trace_idle: 1s
  max_block_duration: 1s
  flush_check_period: 1s
  shutdown_marker_dir: /var/lib/local/tempo/live-store/shutdown-marker
  wal:
    path: /var/lib/local/tempo/live-store/traces

overrides:
  defaults:
    compaction:
      block_retention: 720h
    metrics_generator:
      processors:
        - *proc_svc
        - *proc_span
