# https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - --serverstransport.insecureskipverify=true
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      listeners:
        web:
          namespacePolicy:
            from: All
    ingressRoute:
      dashboard:
        enabled: true
    ports:
      traefik:
        exposedPort: 9000
        expose:
          default: true
      web:
        exposedPort: 8008
        forwardedHeaders:
          insecure: true
        proxyProtocol:
          insecure: true
      websecure:
        expose:
          default: false
    metrics:
      otlp: &otlp-http
        enabled: true
        http:
          enabled: true
          endpoint: http://opentelemetry-collector.opentelemetry-collector.svc.cluster.local:4318
    tracing:
      capturedRequestHeaders:
        - x-real-ip
      otlp:
        <<: *otlp-http
    logs:
      access:
        enabled: true
        otlp:
          <<: *otlp-http
    experimental:
      otlpLogs: true
